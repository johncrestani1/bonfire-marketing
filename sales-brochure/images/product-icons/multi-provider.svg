<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Connecting lines (behind nodes) -->
  <line x1="100" y1="100" x2="100" y2="35" stroke="#1A1A1A" stroke-width="2.5"/>
  <line x1="100" y1="100" x2="160" y2="60" stroke="#1A1A1A" stroke-width="2.5"/>
  <line x1="100" y1="100" x2="165" y2="120" stroke="#1A1A1A" stroke-width="2.5"/>
  <line x1="100" y1="100" x2="135" y2="165" stroke="#1A1A1A" stroke-width="2.5"/>
  <line x1="100" y1="100" x2="65" y2="165" stroke="#1A1A1A" stroke-width="2.5"/>
  <line x1="100" y1="100" x2="35" y2="120" stroke="#1A1A1A" stroke-width="2.5"/>
  <line x1="100" y1="100" x2="40" y2="60" stroke="#1A1A1A" stroke-width="2.5"/>
  <!-- Outer connecting arcs -->
  <line x1="100" y1="35" x2="160" y2="60" stroke="#1A1A1A" stroke-width="1" opacity="0.3"/>
  <line x1="160" y1="60" x2="165" y2="120" stroke="#1A1A1A" stroke-width="1" opacity="0.3"/>
  <line x1="165" y1="120" x2="135" y2="165" stroke="#1A1A1A" stroke-width="1" opacity="0.3"/>
  <line x1="135" y1="165" x2="65" y2="165" stroke="#1A1A1A" stroke-width="1" opacity="0.3"/>
  <line x1="65" y1="165" x2="35" y2="120" stroke="#1A1A1A" stroke-width="1" opacity="0.3"/>
  <line x1="35" y1="120" x2="40" y2="60" stroke="#1A1A1A" stroke-width="1" opacity="0.3"/>
  <line x1="40" y1="60" x2="100" y2="35" stroke="#1A1A1A" stroke-width="1" opacity="0.3"/>
  <!-- Center node (primary - red) -->
  <circle cx="100" cy="100" r="20" fill="#F94238"/>
  <circle cx="100" cy="100" r="15" fill="#F94238" stroke="#FFFFFF" stroke-width="1.5" opacity="0.9"/>
  <circle cx="100" cy="100" r="6" fill="#FFFFFF" opacity="0.8"/>
  <!-- Satellite nodes (gold) -->
  <circle cx="100" cy="35" r="12" fill="#B29D60"/>
  <circle cx="100" cy="35" r="6" fill="#D0B871"/>
  <circle cx="160" cy="60" r="12" fill="#B29D60"/>
  <circle cx="160" cy="60" r="6" fill="#D0B871"/>
  <circle cx="165" cy="120" r="12" fill="#B29D60"/>
  <circle cx="165" cy="120" r="6" fill="#D0B871"/>
  <circle cx="135" cy="165" r="12" fill="#B29D60"/>
  <circle cx="135" cy="165" r="6" fill="#D0B871"/>
  <circle cx="65" cy="165" r="12" fill="#B29D60"/>
  <circle cx="65" cy="165" r="6" fill="#D0B871"/>
  <circle cx="35" cy="120" r="12" fill="#B29D60"/>
  <circle cx="35" cy="120" r="6" fill="#D0B871"/>
  <circle cx="40" cy="60" r="12" fill="#B29D60"/>
  <circle cx="40" cy="60" r="6" fill="#D0B871"/>
</svg>