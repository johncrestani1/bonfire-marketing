  <path d="M28,58 Q28,52 38,50 Q48,52 48,58" fill="#1A1A1A"/>
  <!-- Center community icon -->
  <circle cx="100" cy="100" r="18" fill="#F94238" opacity="0.15"/>
  <circle cx="100" cy="100" r="12" fill="#F94238" opacity="0.25"/>
  <circle cx="100" cy="95" r="5" fill="#B29D60"/>
  <path d="M91,107 Q91,100 100,98 Q109,100 109,107" fill="#B29D60"/>
</svg>