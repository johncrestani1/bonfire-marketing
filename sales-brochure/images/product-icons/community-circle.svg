<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="circleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F94238"/>
      <stop offset="100%" stop-color="#B29D60"/>
    </linearGradient>
  </defs>
  <!-- Gradient ring -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#circleGrad)" stroke-width="4"/>
  <circle cx="100" cy="100" r="75" fill="none" stroke="url(#circleGrad)" stroke-width="1" opacity="0.3"/>
  <!-- Connection lines between people -->
  <line x1="100" y1="28" x2="160" y2="55" stroke="#B29D60" stroke-width="1" opacity="0.2"/>
  <line x1="160" y1="55" x2="175" y2="115" stroke="#B29D60" stroke-width="1" opacity="0.2"/>
  <line x1="175" y1="115" x2="140" y2="165" stroke="#B29D60" stroke-width="1" opacity="0.2"/>
  <line x1="140" y1="165" x2="60" y2="165" stroke="#B29D60" stroke-width="1" opacity="0.2"/>
  <line x1="60" y1="165" x2="25" y2="115" stroke="#B29D60" stroke-width="1" opacity="0.2"/>
  <line x1="25" y1="115" x2="40" y2="55" stroke="#B29D60" stroke-width="1" opacity="0.2"/>
  <line x1="40" y1="55" x2="100" y2="28" stroke="#B29D60" stroke-width="1" opacity="0.2"/>
  <!-- Cross connections -->
  <line x1="100" y1="28" x2="140" y2="165" stroke="#B29D60" stroke-width="0.5" opacity="0.1"/>
  <line x1="160" y1="55" x2="60" y2="165" stroke="#B29D60" stroke-width="0.5" opacity="0.1"/>
  <line x1="175" y1="115" x2="40" y2="55" stroke="#B29D60" stroke-width="0.5" opacity="0.1"/>
  <!-- Person 1 (top) -->
  <circle cx="100" cy="22" r="10" fill="#1A1A1A"/>
  <circle cx="100" cy="18" r="5" fill="#2A2A2A"/>
  <path d="M90,28 Q90,22 100,20 Q110,22 110,28" fill="#1A1A1A"/>
  <!-- Person 2 (top-right) -->
  <circle cx="162" cy="52" r="10" fill="#1A1A1A"/>
  <circle cx="162" cy="48" r="5" fill="#2A2A2A"/>
  <path d="M152,58 Q152,52 162,50 Q172,52 172,58" fill="#1A1A1A"/>
  <!-- Person 3 (bottom-right) -->
  <circle cx="178" cy="115" r="10" fill="#1A1A1A"/>
  <circle cx="178" cy="111" r="5" fill="#2A2A2A"/>
  <path d="M168,121 Q168,115 178,113 Q188,115 188,121" fill="#1A1A1A"/>
  <!-- Person 4 (bottom-right-lower) -->
  <circle cx="142" cy="168" r="10" fill="#1A1A1A"/>
  <circle cx="142" cy="164" r="5" fill="#2A2A2A"/>
  <path d="M132,174 Q132,168 142,166 Q152,168 152,174" fill="#1A1A1A"/>
  <!-- Person 5 (bottom-left-lower) -->
  <circle cx="58" cy="168" r="10" fill="#1A1A1A"/>
  <circle cx="58" cy="164" r="5" fill="#2A2A2A"/>
  <path d="M48,174 Q48,168 58,166 Q68,168 68,174" fill="#1A1A1A"/>
  <!-- Person 6 (bottom-left) -->
  <circle cx="22" cy="115" r="10" fill="#1A1A1A"/>
  <circle cx="22" cy="111" r="5" fill="#2A2A2A"/>
  <path d="M12,121 Q12,115 22,113 Q32,115 32,121" fill="#1A1A1A"/>
  <!-- Person 7 (top-left) -->
  <circle cx="38" cy="52" r="10" fill="#1A1A1A"/>
