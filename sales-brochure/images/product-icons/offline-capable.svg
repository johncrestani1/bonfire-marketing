<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Laptop base -->
  <rect x="35" y="55" width="130" height="85" rx="8" fill="#1A1A1A"/>
  <rect x="40" y="60" width="120" height="72" rx="4" fill="#2A2A2A"/>
  <!-- Screen content area -->
  <rect x="45" y="65" width="110" height="62" rx="2" fill="#1A1A1A"/>
  <!-- Laptop bottom -->
  <path d="M25,140 L35,140 L35,145 Q35,150 40,150 L160,150 Q165,150 165,145 L165,140 L175,140 Q175,145 170,150 L168,155 Q165,160 158,160 L42,160 Q35,160 32,155 L30,150 Q25,145 25,140 Z" fill="#1A1A1A"/>
  <!-- Cloud with X (disconnected) -->
  <path d="M70,85 Q60,85 58,78 Q55,70 63,65 Q68,58 78,60 Q82,52 93,55 Q100,50 108,55 Q118,52 122,62 Q130,63 130,72 Q132,82 122,85 Z" fill="none" stroke="#B29D60" stroke-width="2" opacity="0.4" stroke-dasharray="4,3"/>
  <!-- X over cloud -->
  <line x1="78" y1="65" x2="112" y2="85" stroke="#F94238" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="112" y1="65" x2="78" y2="85" stroke="#F94238" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Green checkmark (works offline) -->
  <circle cx="100" cy="108" r="14" fill="#2D8B46"/>
  <path d="M91,108 L97,114 L110,101" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Status indicator -->
  <circle cx="155" cy="60" r="3" fill="#2D8B46"/>
</svg>