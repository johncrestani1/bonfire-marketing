  <rect x="98" y="110" width="4" height="10" rx="1" fill="#1A1A1A"/>
  <!-- Shield top accent -->
  <path d="M100,30 L155,53 L155,65 L100,42 L45,65 L45,53 Z" fill="#B29D60" opacity="0.15"/>
</svg>