  <!-- Lock shackle -->
  <path d="M85,95 L85,78 Q85,62 100,62 Q115,62 115,78 L115,95" fill="none" stroke="#B29D60" stroke-width="6" stroke-linecap="round"/>
  <!-- Lock inner shackle -->
  <path d="M88,95 L88,80 Q88,67 100,67 Q112,67 112,80 L112,95" fill="none" stroke="#D0B871" stroke-width="3" stroke-linecap="round"/>
