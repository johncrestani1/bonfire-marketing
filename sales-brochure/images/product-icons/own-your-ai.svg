<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- House shape -->
  <path d="M100,25 L170,80 L170,170 Q170,175 165,175 L35,175 Q30,175 30,170 L30,80 Z" fill="#F94238"/>
