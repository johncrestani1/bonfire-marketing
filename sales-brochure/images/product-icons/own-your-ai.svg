  <path d="M100,25 L170,80 L170,170 Q170,175 165,175 L100,175 L100,25 Z" fill="#D93830" opacity="0.5"/>
  <!-- Door -->
  <rect x="82" y="125" width="36" height="50" rx="3" fill="#1A1A1A"/>
  <circle cx="112" cy="152" r="2.5" fill="#B29D60"/>
  <!-- Chimney -->
  <rect x="135" y="35" width="18" height="35" fill="#1A1A1A"/>
  <!-- Window left -->
  <rect x="45" y="90" width="28" height="28" rx="2" fill="#1A1A1A"/>
  <!-- Window right -->
  <rect x="127" y="90" width="28" height="28" rx="2" fill="#1A1A1A"/>
