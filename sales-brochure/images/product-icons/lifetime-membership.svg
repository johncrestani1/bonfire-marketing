  <rect x="50" y="95" width="60" height="4" rx="2" fill="#B29D60" opacity="0.5"/>
  <rect x="50" y="105" width="45" height="4" rx="2" fill="#B29D60" opacity="0.3"/>
  <!-- Star emblem -->
  <polygon points="140,100 143,108 152,108 145,113 147,122 140,117 133,122 135,113 128,108 137,108" fill="#B29D60" opacity="0.6"/>
  <!-- Chip -->
  <rect x="50" y="52" width="20" height="14" rx="2" fill="#B29D60" opacity="0.4"/>
  <line x1="55" y1="52" x2="55" y2="66" stroke="#1A1A1A" stroke-width="0.5"/>
  <line x1="60" y1="52" x2="60" y2="66" stroke="#1A1A1A" stroke-width="0.5"/>
  <line x1="65" y1="52" x2="65" y2="66" stroke="#1A1A1A" stroke-width="0.5"/>
  <!-- Bottom ribbon -->
  <path d="M70,135 L100,145 L130,135 L130,155 L115,150 L100,160 L85,150 L70,155 Z" fill="#F94238"/>
  <path d="M75,137 L100,146 L125,137 L125,152 L113,148 L100,156 L87,148 L75,152 Z" fill="#F94238" opacity="0.8"/>
