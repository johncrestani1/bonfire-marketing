  <circle cx="100" cy="26" r="2.5" fill="#F94238"/>
  <circle cx="85" cy="30" r="2" fill="#F94238" opacity="0.7"/>
  <circle cx="115" cy="30" r="2" fill="#F94238" opacity="0.7"/>
  <!-- Card stripe -->
  <rect x="35" y="65" width="130" height="15" fill="#F94238" opacity="0.8"/>
