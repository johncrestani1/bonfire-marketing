<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Badge body -->
  <rect x="35" y="45" width="130" height="90" rx="10" fill="#1A1A1A"/>
  <rect x="38" y="48" width="124" height="84" rx="8" fill="none" stroke="#B29D60" stroke-width="1.5"/>
