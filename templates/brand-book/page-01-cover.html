<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Brand Book — Page 1: Cover</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1920px;height:1080px;overflow:hidden}
.page{width:1920px;height:1080px;background:#0d0d0d;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.logo{width:280px;height:280px;margin-bottom:40px}
.logo img{width:100%;height:100%}
.logo-placeholder{width:280px;height:280px;border:2px solid #f94238;display:flex;align-items:center;justify-content:center;color:#f94238;font-family:'Rajdhani',sans-serif;font-size:14px}
h1{font-family:'Orbitron',monospace;font-weight:900;font-size:52px;text-transform:uppercase;letter-spacing:6px;color:#e8e8e8;margin-bottom:16px}
.subtitle{font-family:'Rajdhani',sans-serif;font-weight:500;font-size:22px;color:#999;letter-spacing:3px;text-transform:uppercase}
.edition{position:absolute;bottom:60px;right:80px;font-family:'Rajdhani',sans-serif;font-weight:400;font-size:14px;color:#666}
.accent-line{width:120px;height:3px;background:linear-gradient(90deg,#f94238,#ff8c42,#ffcc02);margin:32px 0}
</style>
</head>
<body>
<div class="page">
  <div class="logo-placeholder">[BONFIRE LOGO 280x280]</div>
  <div class="accent-line"></div>
  <h1>Bonfire Terminal</h1>
  <div class="subtitle">Brand Identity System</div>
  <div class="edition">2026 — M3M3TIC LLC</div>
</div>
</body>
</html>
